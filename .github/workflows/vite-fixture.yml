name: Vite Fixture

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  vite-fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: npm --prefix examples/vite-fixture install --no-audit --no-fund
      - run: npm --prefix examples/vite-fixture run build
