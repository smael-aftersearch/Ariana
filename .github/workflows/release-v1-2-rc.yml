name: Ariana 1.2 RC Release Candidate

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release candidate version
        required: true
        default: 1.2.0-rc.1
      run_gates:
        description: Run full release gates before packing
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

jobs:
  candidate:
    name: Build release candidate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run release gates
        if: ${{ inputs.run_gates == 'true' }}
        run: npm run release:gates:v1.2
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Build package candidate only
        if: ${{ inputs.run_gates != 'true' }}
        run: |
          npm run build
          npm run build:admin
          npm run pack:v1.2:candidate
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Run packed candidate smoke
        run: node scripts/packed-candidate-smoke.mjs
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Create release manifest
        run: node scripts/create-release-manifest.mjs
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Verify release manifest
        run: node scripts/verify-release-manifest.mjs
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Upload npm package tarballs
        uses: actions/upload-artifact@v4
        with:
          name: ariana-${{ inputs.version }}-npm-tarballs
          path: npm-packages/*.tgz
          if-no-files-found: error

      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: ariana-${{ inputs.version }}-manifest
          path: release-manifests/*
          if-no-files-found: error

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: ariana-${{ inputs.version }}-release-notes
          path: docs/releases/1.2.0-rc.1.md
          if-no-files-found: error
