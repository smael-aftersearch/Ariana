name: Router Production Benchmark

on:
  workflow_dispatch:

jobs:
  router-production-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: npm --prefix benchmarks/router-production install --no-audit --no-fund
      - run: npm --prefix benchmarks/router-production run bench
