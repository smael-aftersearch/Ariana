name: Ariana 1.2 GitHub Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Candidate version
        required: true
        default: 1.2.0-rc.1
      confirm:
        description: Type CREATE_GITHUB_RELEASE to confirm
        required: true
        default: NO

permissions:
  contents: write

jobs:
  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Confirm release
        run: |
          if [ "${{ inputs.confirm }}" != "CREATE_GITHUB_RELEASE" ]; then
            echo "Confirmation failed. Type CREATE_GITHUB_RELEASE to continue."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build package artifacts
        run: |
          npm run build
          npm run build:admin
          npm run pack:v1.2:candidate
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Run packed candidate smoke
        run: node scripts/packed-candidate-smoke.mjs
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Create release manifest
        run: node scripts/create-release-manifest.mjs
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Verify release manifest
        run: node scripts/verify-release-manifest.mjs
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Ariana ${{ inputs.version }}
          body_path: docs/releases/1.2.0-rc.1.md
          prerelease: true
          draft: true
          files: |
            npm-packages/*.tgz
            release-manifests/*
