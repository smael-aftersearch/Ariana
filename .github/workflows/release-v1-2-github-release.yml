name: Ariana 1.2 GitHub Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Candidate version
        required: true
        default: 1.2.0-rc.1
      confirm:
        description: Type CREATE_GITHUB_RELEASE to confirm
        required: true
        default: NO

permissions:
  contents: write

jobs:
  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Confirm release
        run: |
          if [ "${{ inputs.confirm }}" != "CREATE_GITHUB_RELEASE" ]; then
            echo "Confirmation failed. Type CREATE_GITHUB_RELEASE to continue."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Ariana ${{ inputs.version }}
          body_path: docs/releases/1.2.0-rc.1.md
          prerelease: true
          draft: true
