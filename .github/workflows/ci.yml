name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: npm test
      - run: npm run check:stable-api-docs
      - run: npm run check:runtime-lifecycle-docs
      - run: npm run check:compiler-diagnostics
      - run: npm run check:template-typecheck-docs
      - run: npm run check:template-diagnostics-fixture
      - run: npm run verify:release
      - run: npm run inspect:tarballs
      - run: npm run smoke:install
      - run: npm run smoke:create-ariana
      - run: npm run smoke:generated-app
      - run: npm run smoke:generated-app:coverage
      - run: npm run bench:smoke
