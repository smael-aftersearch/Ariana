name: Island Benchmark

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  island-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: npm --prefix benchmarks/islands install --no-audit --no-fund
      - run: npm --prefix benchmarks/islands run bench
