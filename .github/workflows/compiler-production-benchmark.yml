name: Compiler Production Benchmark

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compiler-production-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm --prefix benchmarks/compiler-production install
      - run: npm --prefix benchmarks/compiler-production run bench
