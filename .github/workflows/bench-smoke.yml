name: Benchmark Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  benchmark-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: node scripts/bench-smoke.mjs
