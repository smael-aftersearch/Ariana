name: Framework Benchmark

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - benchmarks/framework-comparison/**
      - packages/**
      - package.json
      - package-lock.json
      - .github/workflows/framework-benchmark.yml

permissions:
  contents: write

jobs:
  benchmark:
    name: Run framework comparison benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install --no-audit --no-fund

      - name: Build Ariana packages
        run: npm run build

      - name: Run framework benchmark
        run: npm run bench:framework

      - name: Copy benchmark report into docs
        run: cp benchmarks/framework-comparison/results/latest.md docs/PERFORMANCE_RESULTS_V1.md

      - name: Commit benchmark results
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add benchmarks/framework-comparison/results/latest.json benchmarks/framework-comparison/results/latest.md docs/PERFORMANCE_RESULTS_V1.md
          if git diff --cached --quiet; then
            echo "No benchmark result changes to commit."
          else
            git commit -m "Update framework benchmark results"
            git push
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: framework-benchmark-results
          path: |
            benchmarks/framework-comparison/results/
            docs/PERFORMANCE_RESULTS_V1.md
