name: Framework Bench

on:
  pull_request:
    branches: [main]

jobs:
  framework-bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: npm --prefix benchmarks/framework-comparison install --no-audit --no-fund
      - run: npm --prefix benchmarks/framework-comparison run bench
